services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fiscal-php
    ports:
      - "8000:8000"
    volumes:
      - ./:/var/www/html
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: fiscal_php
      DB_USERNAME: fiscal
      DB_PASSWORD: fiscal
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    container_name: fiscal-postgres
    environment:
      POSTGRES_DB: fiscal
      POSTGRES_USER: fiscal
      POSTGRES_PASSWORD: fiscal
    ports:
      - "5432:5432"
    volumes:
      - fiscal_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fiscal -d fiscal"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  fiscal_pgdata:
